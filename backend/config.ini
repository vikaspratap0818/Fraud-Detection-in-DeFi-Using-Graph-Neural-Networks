[model]
hidden_dim = 64
embedding_dim = 32
num_layers = 3
dropout = 0.3

[training]
epochs = 100
batch_size = 32
learning_rate = 0.001
weight_decay = 0.0001

[data]
data_path = ../data/transaction_dataset.csv
save_dir = ../data
test_size = 0.2
val_size = 0.1

[inference]
model_path = ../models/gnn_model.pt
data_dir = ../data
device = cuda

[api]
host = 0.0.0.0
port = 8000
debug = false
