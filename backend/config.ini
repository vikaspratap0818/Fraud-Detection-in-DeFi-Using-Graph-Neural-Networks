[model]
hidden_dim = 64
embedding_dim = 32
num_layers = 3
dropout = 0.3

[training]
epochs = 100
batch_size = 32
learning_rate = 0.001
weight_decay = 0.0001

[data]
# Relative paths are resolved relative to config file location at runtime
data_path = ../data/transaction_dataset.csv
save_dir = ../data
test_size = 0.2
val_size = 0.1

[inference]
# Relative paths are resolved relative to config file location at runtime
model_path = ../models/gnn_model.pt
data_dir = ../data
# device = auto will check torch.cuda.is_available(), fallback to 'cpu' if unavailable
device = auto

[api]
host = 127.0.0.1
port = 8000
debug = false
